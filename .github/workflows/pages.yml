name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js build --config demo/periwinkle.config.mjs --out site
      # Ship the config builder alongside the demo. It links to logo assets
      # via `resources/Logo_Banner/logo.svg`, so those are copied too.
      - name: Bundle config builder and its assets
        run: |
          cp config-builder.html site/
          mkdir -p site/resources/Logo_Banner
          cp resources/Logo_Banner/logo.svg site/resources/Logo_Banner/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
